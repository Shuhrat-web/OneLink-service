services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: smartlink
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - ./data/postgres:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d smartlink"]
      interval: 5s
      timeout: 5s
      retries: 20

  app:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      NODE_ENV: ${NODE_ENV:-production}
      APP_BASE_URL: ${APP_BASE_URL:-http://localhost:8000}
      AUTH_SECRET: ${AUTH_SECRET:-change-me-in-production}
      COOKIE_SECURE: ${COOKIE_SECURE:-}
      APP_HASH_SALT: ${APP_HASH_SALT:-change-me-in-production}
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/smartlink?schema=public
      TURNSTILE_SECRET_KEY: ${TURNSTILE_SECRET_KEY:-}
      NEXT_PUBLIC_TURNSTILE_SITE_KEY: ${NEXT_PUBLIC_TURNSTILE_SITE_KEY:-}
      LINK_PREFIX: ${LINK_PREFIX:-}
      ADMIN_EMAIL: ${ADMIN_EMAIL:-admin@example.com}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-ChangeMe123!}
    ports:
      - "8000:3000"
